<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PalST — Underwriting</title>
  <meta name="description" content="PalST demo: interactive long-form reading with footnotes, exhibits, and dossier themes.">
  <link rel="stylesheet" href="./vendor/styles/palimpsest.css">
  <style>
    body { margin: 0; min-height: 100dvh; }
    .ps-demo-banner {
      max-width: 680px;
      margin: 0 auto;
      padding: 1rem 1.25rem 0;
      font: 0.85rem/1.45 system-ui, sans-serif;
      color: var(--ps-muted, #6e6e73);
    }
    .ps-demo-banner strong { color: var(--ps-text, #1d1d1f); }
    .ps-demo-banner code {
      font-size: 0.9em;
      color: var(--ps-term, #1a4d7a);
    }
    /* Host chrome — mirrors Piligrim reader topbar; product brands stay in the host */
    .ps-demo-topbar {
      display: none;
      position: sticky;
      top: 0;
      z-index: 30;
      padding: 12px 20px;
      font: 0.9rem/1.2 system-ui, sans-serif;
      background: color-mix(in srgb, var(--ps-bg, #e8e4dc) 92%, transparent);
      backdrop-filter: blur(8px);
    }
    body.ps-in-reader .ps-demo-topbar,
    body.in-reader .ps-demo-topbar { display: block; }
    body.ps-in-reader .ps-demo-banner,
    body.in-reader .ps-demo-banner { display: none; }
    .ps-demo-topbar a {
      color: var(--ps-text, #1c1a17);
      text-decoration: none;
    }
    .ps-demo-topbar a:hover { color: var(--ps-accent, #8b1e1e); }
  </style>
</head>
<body>
  <header class="ps-demo-topbar"><a href="#/">← PalST</a></header>
  <p class="ps-demo-banner"><strong>PalST</strong> — an engine for text with layers. Sample piece <em>Underwriting</em>. Package <code>@krwg/palimpsest</code>.</p>
  <div id="app"></div>
  <script type="module">
    import {
      createReader,
      paperTheme,
      dossierTheme,
      sepiaTheme,
      ENGINE_SHORT_NAME,
    } from './vendor/index.js';

    document.title = ENGINE_SHORT_NAME + ' — Underwriting';

    await createReader({
      root: document.getElementById('app'),
      baseUrl: new URL('./', import.meta.url).href,
      manifestUrl: new URL('./chapters/manifest.json', import.meta.url).href,
      theme: [paperTheme, dossierTheme, sepiaTheme],
      initialThemeName: 'paper',
      chrome: true,
      lightbox: true,
      navigation: { gestures: true, continuePrompt: true },
      strings: {
        toolbarLabel: 'Reading settings',
        continueMessage: 'You left off around ~{pct}%',
        continueYes: 'Continue',
        continueNo: 'Start over',
        translate: 'Translate',
        original: 'Original',
      },
    });
  </script>
</body>
</html>

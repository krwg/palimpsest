<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PalST reader</title>
  <link rel="stylesheet" href="./vendor/styles/palimpsest.css">
  <style>body{margin:0;min-height:100dvh}</style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { createReader, paperTheme, dossierTheme } from './vendor/index.js';
    await createReader({
      root: document.getElementById('app'),
      baseUrl: new URL('./', import.meta.url).href,
      theme: [paperTheme, dossierTheme],
      initialThemeName: 'paper',
      chrome: true,
      navigation: { gestures: true, continuePrompt: true },
    });
  </script>
</body>
</html>
